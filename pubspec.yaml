name: brain_storm
description: Full-stack Flutter multiplayer quiz game using Supabase Realtime.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.12.0
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  uuid: ^4.5.3
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonas.jpg
    - assets/susipazinkime.png
    - assets/pasirink.png
    - assets/nenusimink.png
    - assets/no.png
    - assets/saunuolis.png
    - assets/susikaupk.png
    - assets/yes.png
    - assets/pirmas.mp3
    - assets/taip.mp3
    - assets/ne.mp3
    - assets/cemp.mp3

